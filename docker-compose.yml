version: '3.8'

services:
  #postgres main
  db:
    image: postgres:15
    container_name: postgres_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - '5432:5432'
    
    volumes:
      - postgres_data:/var/lib/postgresql/data
  
  #postgres airflow
  postgres_airflow:
    image: postgres:13
    environment:
      POSTGRES_USER: ${AIRFLOW_DB_USER}
      POSTGRES_PASSWORD: ${AIRFLOW_DB_PASSWORD}
      POSTGRES_DB: ${AIRFLOW_DB_NAME}
    volumes:
      - postgres_airflow_data:/var/lib/postgresql/data
    restart: always
  
  #redis for airflow
  redis:
    image: redis:7.2-bookworm
    restart: always

  
  #airflow init
  airflow-init:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    # image: apache/airflow:2.10.0
    command: >
      bash -c "airflow db migrate && airflow db upgrade && airflow users create --username ${AIRFLOW_ADMIN_USER} --password ${AIRFLOW_ADMIN_PASSWORD} --firstname Admin --lastname User --role Admin --email ${AIRFLOW_ADMIN_EMAIL}"
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres_airflow/${AIRFLOW_DB_NAME}
      - AIRFLOW__CELERY__BROKER_URL=redis://:@redis:6379/0
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres_airflow/${AIRFLOW_DB_NAME}
      - AIRFLOW_UID=${AIRFLOW_UID}
      - POSTGRES_HOST=db
    depends_on:
      - postgres_airflow
      - redis
    restart: "no"
  
  #airflow-webserver
  airflow-webserver:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    # image: apache/airflow:2.10.0
    command: webserver
    ports:
      - "8080:8080"
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - ./src_main:/opt/airflow/src_main
      - ./dbt:/opt/airflow/dbt
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres_airflow/${AIRFLOW_DB_NAME}
      - AIRFLOW__CELERY__BROKER_URL=redis://:@redis:6379/0
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres_airflow/${AIRFLOW_DB_NAME}
      - AIRFLOW_UID=${AIRFLOW_UID}
      - AIRFLOW__WEBSERVER__HOST=0.0.0.0
      - AIRFLOW__WEBSERVER__PORT=8080
      - AIRFLOW__WEBSERVER__SECRET_KEY=my-super-secret-key-change-it
      - AIRFLOW__WEBSERVER__COOKIE_SECURE=False
      - POSTGRES_HOST=db
    depends_on:
      - postgres_airflow
      - redis
      - airflow-init
    restart: always
    env_file:
      - .env

  #airflow-scheduler
  airflow-scheduler:
    build:
      context: .
      dockerfile: Dockerfile.airflow
    # image: apache/airflow:2.10.0
    command: scheduler
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - ./src_main:/opt/airflow/src_main
      - ./dbt:/opt/airflow/dbt
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres_airflow/${AIRFLOW_DB_NAME}
      - AIRFLOW__CELERY__BROKER_URL=redis://:@redis:6379/0
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres_airflow/${AIRFLOW_DB_NAME}
      - AIRFLOW_UID=${AIRFLOW_UID}
      - POSTGRES_HOST=db
    depends_on:
      - postgres_airflow
      - redis
      - airflow-init
    restart: always
    env_file:
      - .env

  #airflow-worker
  airflow-worker:
    image: apache/airflow:2.10.0
    command: celery worker
    volumes:
      - ./airflow/dags:/opt/airflow/dags
      - ./airflow/logs:/opt/airflow/logs
      - ./airflow/plugins:/opt/airflow/plugins
      - ./src:/opt/airflow/src
      - ./src_main:/opt/airflow/src_main
      - ./dbt:/opt/airflow/dbt
    environment:
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres_airflow/${AIRFLOW_DB_NAME}
      - AIRFLOW__CELERY__BROKER_URL=redis://:@redis:6379/0
      - AIRFLOW__CELERY__RESULT_BACKEND=db+postgresql://${AIRFLOW_DB_USER}:${AIRFLOW_DB_PASSWORD}@postgres_airflow/${AIRFLOW_DB_NAME}
      - AIRFLOW_UID=${AIRFLOW_UID}
      - POSTGRES_HOST=db
    depends_on:
      - postgres_airflow
      - redis
      - airflow-init
    restart: always
    env_file:
      - .env
  
  #dbt-service
  dbt:
    build: . # Собираем образ из Dockerfile в текущей папке
    container_name: dbt
    entrypoint: [""]
    command: ["sleep", "infinity"]
    volumes:
      - ./dbt:/usr/app/dbt
      - ./.dbt:/root/.dbt
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    depends_on:
      - db
    restart: "no"

volumes:
  postgres_data:
  pgadmin_data:
  postgres_airflow_data:
